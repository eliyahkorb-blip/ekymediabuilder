<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://fonts.googleapis.com https://fonts.gstatic.com https://api.fontshare.com;">
<title>EKY Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #0a0a0b;
    color: #f4f4f2;
    font-family: 'Satoshi', -apple-system, sans-serif;
    font-size: 13px;
    font-weight: 500;
    user-select: none;
  }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2c2c2e; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3c3c3e; }
  button { cursor: pointer; font-family: inherit; }
  input, textarea, select { font-family: inherit; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  #root { height: 100vh; animation: fadeUp 0.3s ease; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app.js"></script>
</body>
</html>
